
# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER
#bind = CAPS, escape

## SPECIAL WORKSPACE
bind = $mainMod, S, togglespecialworkspace, quick
bind = $mainMod, I, togglespecialworkspace, home
bind = $mainMod SHIFT, I, movetoworkspace, special:home

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
#bind = $mainMod, Q, exec, alacritty  #open the terminal
bind = $mainMod, Q, exec, ghostty  #open the terminal
bind = $mainMod, X, killactive, # close the active window
bind = $mainMod SHIFT CTRL, M, exit, # Exit Hyprland all together no (force quit Hyprland)
bind = $mainMod, E, exec, thunar --class floatthunar # Show the graphical file browser
bind = $mainMod, V, togglefloating, # Allow a window to float
bind = $mainMod, F, fullscreen, # Allow a window to float
bind = $mainMod, SPACE, exec, wofi # Show the graphicall app launcher
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, M, togglesplit, # dwindle
bind = $mainMod SHIFT, P, exec, hyprpicker
bind = $mainMod, W, exec, brave-beta --profile-directory='Default' #open browser
bind = $mainMod, R, exec, obsidian --ozone-platform-hint=auto # open obsidian
# bind = $mainMod, G, exec, xournalpp
bind = $mainMod SHIFT, N, exec, swaync-client -t -sw
# bind = $mainMod SHIFT, C, exec, wl-color-picker clipboard --no-notify
bind = $mainMod SHIFT, E, exec, bemoji -t

# KEYBINDINGS FOR WAYBAR
bind = $mainMod SHIFT, B, exec, /home/bastel/.config/hypr/scripts/toggle_dock.sh
bind = $mainMod, B, exec, /home/bastel/.config/hypr/scripts/toggle_waybar.sh

# KEYBINDINGS FOR LOCK
#bind = $mainMod, O, exec, swaylock -i /home/bastel/Wallpapers/tukrgrey.jpg
bind = $mainMod, O, exec, swaylock --image ~/Wallpapers/tuksgrey.jpg --scaling fill 
bind = $mainMod SHIFT, O, exec, swaylock -f -c 000000 --scaling fill --clock --indicator
bind = $mainMod SHIFT CTRL, O, exec, wlogout
#bind = $mainMod + B, exec, pkill -SIGUSR1 waybar

# KEYBINDINGS FOR SCREENSHOT
#bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy # take a screenshot
#bind = $mainMod SHIFT CTRL, S, exec, grim -g "$(slurp)" ~/Screenshots/Screenshot$(date +'%Y-%m-%d%H-%M-%S').png
#bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot copied to clipboard"
# bind = $mainMod SHIFT CTRL, S, exec, bash -c 'FILE=~/Photos/Screenshots/Screenshot$(date +'%Y-%m-%d%H-%M-%S').png; grim -g "$(slurp)" "$FILE" && wl-copy < "$FILE" && notify-send "Screenshot saved and copied" "$FILE"'
bind = $mainMod SHIFT CTRL, S, exec, bash -c 'FILE=~/Photos/Screenshots/Screenshot$(date +'%Y-%m-%d%H-%M-%S').png; GEOM=$(slurp -b 00000088 -w 0); sleep 0.05; grim -s 1 -g "$GEOM" "$FILE" && wl-copy < "$FILE" && notify-send "Screenshot saved and copied" "$FILE"'
bind = $mainMod SHIFT, S, exec, bash -c 'GEOM=$(slurp -b 00000088 -w 0); sleep 0.05; grim -s 1 -g "$GEOM" - | wl-copy && notify-send "Screenshot copied to clipboard"'



